<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Cairn — Matt Carpenter</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
<style>
  /* The canvas inside the iframe was designed at this width.
     Tweak if the design changes. */
  :root { --canvas-width: 1400px; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f4f1ec;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  /* Block pinch-zoom on iOS Safari, which ignores user-scalable=no */
  html { touch-action: pan-y; }

  .frame-stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  iframe {
    width: var(--canvas-width);
    height: calc(var(--canvas-width) * 1.6); /* generous; adjust if content is taller */
    border: 0;
    transform-origin: top center;
    background: #f4f1ec;
    /* the JS below sets transform: scale(...) based on viewport width */
  }
</style>
</head>
<body>
  <div class="frame-stage">
    <iframe id="canvas" src="canvas.html" scrolling="no" title="Cairn design canvas"></iframe>
  </div>

<script>
  (function () {
    var iframe = document.getElementById('canvas');
    var stage = document.querySelector('.frame-stage');
    var CANVAS_WIDTH = 1400; // must match --canvas-width above

    function fit() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var scale = vw / CANVAS_WIDTH;

      iframe.style.transform = 'scale(' + scale + ')';

      // Once we know the inner content height, set the iframe height
      // to match. We add a polling check because the React canvas takes
      // a moment to bootstrap.
      try {
        var doc = iframe.contentDocument;
        if (doc && doc.body) {
          var contentHeight = Math.max(
            doc.body.scrollHeight,
            doc.documentElement.scrollHeight
          );
          if (contentHeight > 200) {
            iframe.style.height = contentHeight + 'px';
            // The scaled height of the iframe sets how tall the page is.
            stage.style.height = (contentHeight * scale) + 'px';
          }
        }
      } catch (e) {
        // same-origin so this should work, but guard anyway
      }
    }

    // Initial fit and on resize
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', fit);
    iframe.addEventListener('load', function () {
      fit();
      // Poll for ~10s to catch React mounting and content reflow
      var start = Date.now();
      var iv = setInterval(function () {
        fit();
        if (Date.now() - start > 10000) clearInterval(iv);
      }, 250);
    });

    // Block pinch-zoom gesture events that some browsers fire even
    // with user-scalable=no.
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });

    // Block ctrl/cmd + wheel zoom on desktop
    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey || e.metaKey) e.preventDefault();
    }, { passive: false });

    // First fit even before iframe load (in case it's already cached)
    fit();
  })();
</script>
</body>
</html>
