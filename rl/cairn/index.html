<style>
  :root {
    --paper: #f4f1ec; --paper-2: #ebe6df;
    --ink: #1a1816; --ink-2: #4a4640; --ink-3: #8a8580;
    --rule: #c9c3ba; --rule-soft: #ddd6cb;
    --accent: #d4623a; --warm: #f0a060; --cool: #d8e8f5;
    --safety: #c43d2a; --co: #d89030;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); color: var(--ink); font-family: 'Inter Tight', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Fraunces', serif; font-weight: 300; letter-spacing: -0.02em; }

  header.top {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244, 241, 236, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    padding: 14px 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header.top .brand { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.01em; }
  header.top nav { display: flex; gap: 24px; font-size: 12px; }
  header.top nav a { color: var(--ink-2); text-decoration: none; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em; }
  header.top nav a:hover { color: var(--accent); }
  @media (max-width: 720px) { header.top nav { display: none; } }

  .section {
    border-bottom: 1px solid var(--rule-soft);
    padding: 56px 0 64px;
  }
  .section-head {
    max-width: 1100px; margin: 0 auto 36px; padding: 0 24px;
  }
  .section-head .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; color: var(--ink-3); text-transform: uppercase;
  }
  .section-head h2 {
    font-family: 'Fraunces', serif; font-weight: 300; letter-spacing: -0.02em;
    font-size: clamp(32px, 4vw, 52px); margin: 8px 0 0; line-height: 1.05;
  }
  .section-head p {
    font-size: 16px; color: var(--ink-2); margin: 12px 0 0; max-width: 640px; line-height: 1.5;
  }

  /* Artboard — scales a fixed-pixel design down to fit container width */
  .board-wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
  }
  .board {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: hidden;
    width: 100%;
  }
  .board-inner {
    transform-origin: top left;
  }

  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 520px) {
    .grid-4 { grid-template-columns: 1fr; }
  }

  footer.foot {
    padding: 40px 24px 60px; text-align: center;
    color: var(--ink-3); font-size: 12px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }
</style>
